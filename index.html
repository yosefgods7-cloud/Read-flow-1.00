<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ReadFlow</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#09090b">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzAwMCIvPjx0ZXh0IHg9IjUwIiB5PSI1MCIgZm9udC1mYW1pbHk9IkFyaWFsIiBmb250LXNpemU9IjQwIiBmaWxsPSIjZmZmIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjM1ZW0iPlI8L3RleHQ+PC9zdmc+">
    <script>
      window.addEventListener('error', function(e) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#ef4444;color:white;padding:10px;z-index:9999;font-family:monospace;font-size:12px;';
        errDiv.innerText = 'Global Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno;
        document.body.appendChild(errDiv);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;top:40px;left:0;width:100%;background:#f97316;color:white;padding:10px;z-index:9999;font-family:monospace;font-size:12px;';
        errDiv.innerText = 'Promise Rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason);
        document.body.appendChild(errDiv);
      });
    </script>
  </head>
  <body style="background-color: #09090b; color: #fafafa; margin: 0; overflow: hidden;" class="bg-zinc-950 text-zinc-50 overflow-hidden">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="./src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
